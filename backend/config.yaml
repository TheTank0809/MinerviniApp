# MinerviniApp configuration
# Add new screens or universes here; the pipeline and website pick them up automatically.

settings:
  benchmark_index: "^CRSLDX"        # Nifty 500 on Yahoo Finance
  benchmark_fallback: "^NSEI"       # Nifty 50 (used if Nifty 500 data is unavailable)
  min_median_daily_traded_value_cr: 5
  max_promoter_pledge_pct: 15
  buy_zone_extension_pct: 5
  max_stop_pct: 10
  history_years: 2                  # OHLCV lookback
  request_delay_seconds: 1.2        # politeness delay between screener.in requests
  llm_model: "claude-sonnet-5"      # used only if ANTHROPIC_API_KEY is set
  llm_max_new_stocks_per_run: 25    # cost guard for verdict synthesis
  llm_max_existing_catalyst_checks_per_run: 10  # cost guard for the lighter recheck below
  llm_catalyst_recheck_days: 30     # how often an already-tracked stock's H3/governance is rechecked

universes:
  india:
    label: "India"
    enabled: true
    currency: "INR"
    yahoo_suffixes: [".NS", ".BO"]
    screens:
      # url = paste the exact address bar URL of the screen on screener.in, no edits.
      # slug = internal folder name under docs/data/ — can be anything, unrelated to screener.in.
      # short = the tick-badge code shown per stock on the website when it's in this screen.
      - name: "Minervini Screener"
        url: "https://www.screener.in/screens/877182/minervini-screener/"
        slug: "minervini-filter"
        short: "MV"
        enabled: true
      - name: "Growth Screener"
        url: "https://www.screener.in/screens/873628/growth-screener/"
        slug: "growth-filter"
        short: "GR"
        enabled: true

  # Placeholder for the planned US / global section. When you're ready, set enabled: true
  # and add a source (screener.in doesn't cover US stocks; a different fetcher will be needed).
  us:
    label: "US / Global"
    enabled: false
    currency: "USD"
    yahoo_suffixes: [""]
    screens: []
