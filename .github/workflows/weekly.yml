name: Weekly Minervini scan

on:
  schedule:
    - cron: "0 4 * * 0"   # every Sunday 04:00 UTC = 09:30 IST
  workflow_dispatch: {}    # run it manually from the Actions tab any time

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pipeline
        env:
          SCREENER_SESSIONID: ${{ secrets.SCREENER_SESSIONID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python backend/pipeline.py

      - name: Commit updated data
        run: |
          git config user.name "minervini-bot"
          git config user.email "actions@github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "Weekly scan $(date -u +%F)"
          git push

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Deploy the site on every push to main too (so UI changes go live immediately)
